# ============================================================================
# JWT VERIFICATION AUDIT (2026-03-08)
#
# verify_jwt = false means Supabase gateway does NOT enforce JWT.
# Functions with verify_jwt = false MUST either:
#   (a) perform manual JWT verification in their handler code, OR
#   (b) be legitimately called without a user JWT (webhooks, cron workers)
#
# AUDIT RESULTS — all verify_jwt=false functions reviewed:
#
# MIGRATED to verify_jwt = true (had manual JWT check — now belt+suspenders):
#   fetch-meetings, sync-meetings, zoom-fetch-meetings, zoom-sync-meetings,
#   youtube-import, file-upload-transcribe
#
# LEGITIMATELY NO JWT (webhooks/workers — cannot have user JWT):
#   webhook              — receives external Fathom webhook callbacks
#   zoom-webhook         — receives external Zoom webhook callbacks
#   polar-webhook        — receives external Polar payment webhook callbacks
#   automation-webhook   — receives external webhook triggers
#   process-embeddings   — worker invoked by pg_cron / self-invocation
#   automation-scheduler — worker invoked by pg_cron
# ============================================================================

