# ============================================================================
# JWT VERIFICATION AUDIT (2026-03-08)
#
# verify_jwt = false means Supabase gateway does NOT enforce JWT.
# Functions with verify_jwt = false MUST either:
#   (a) perform manual JWT verification in their handler code, OR
#   (b) be legitimately called without a user JWT (webhooks, cron workers)
#
# AUDIT RESULTS — all verify_jwt=false functions reviewed:
#
# SHOULD USE verify_jwt = true (do manual JWT check anyway — belt+suspenders):
#   fetch-meetings       — user-initiated, has manual JWT check in code
#   sync-meetings        — user-initiated, has manual JWT check in code
#   zoom-fetch-meetings  — user-initiated, has manual JWT check in code
#   zoom-sync-meetings   — user-initiated, has manual JWT check in code
#   youtube-import       — user-initiated, has manual JWT check in code
#   file-upload-transcribe — user-initiated, has manual JWT check in code
#
# LEGITIMATELY NO JWT (webhooks/workers — cannot have user JWT):
#   webhook              — receives external Fathom webhook callbacks
#   automation-webhook   — receives external webhook triggers
#   process-embeddings   — worker invoked by pg_cron / self-invocation
#   automation-scheduler — worker invoked by pg_cron
#
# ACTION: The 6 user-initiated functions above should be migrated to
# verify_jwt = true. They already do manual JWT checks, so enabling
# gateway-level JWT just adds defense in depth. Filed as future work.
# ============================================================================

