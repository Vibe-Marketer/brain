# ============================================================================
# JWT VERIFICATION AUDIT (2026-03-26)
#
# verify_jwt = false means Supabase gateway does NOT enforce JWT.
# Functions with verify_jwt = false MUST either:
#   (a) perform manual JWT verification in their handler code, OR
#   (b) be legitimately called without a user JWT (webhooks, cron workers)
#
# LEGITIMATELY NO JWT (webhooks — cannot have user JWT):
#   webhook              — receives external Fathom webhook callbacks
#   zoom-webhook         — receives external Zoom webhook callbacks
#   polar-webhook        — receives external Polar payment webhook callbacks
# ============================================================================

# --- User-initiated functions (verify_jwt = true) ---
# These all perform manual JWT checks in code as well (defense in depth)

[functions.fetch-meetings]
verify_jwt = true

[functions.sync-meetings]
verify_jwt = true

[functions.zoom-fetch-meetings]
verify_jwt = true

[functions.zoom-sync-meetings]
verify_jwt = true

[functions.youtube-import]
verify_jwt = true

[functions.file-upload-transcribe]
verify_jwt = true

[functions.fetch-single-meeting]
verify_jwt = true

[functions.save-host-email]
verify_jwt = true

[functions.fathom-oauth-url]
verify_jwt = true

[functions.fathom-oauth-callback]
verify_jwt = true

[functions.fathom-oauth-refresh]
verify_jwt = true

[functions.youtube-api]
verify_jwt = true

[functions.generate-content]
verify_jwt = true

[functions.generate-ai-titles]
# User-initiated bulk AI title generation — requires authenticated session
verify_jwt = true

[functions.auto-tag-calls]
# User-initiated bulk AI tagging — requires authenticated session
verify_jwt = true

# --- Webhook receivers (no user JWT available) ---

[functions.webhook]
# Receives external Fathom webhook callbacks — no user JWT available
verify_jwt = false

[functions.zoom-webhook]
# Receives external Zoom webhook callbacks — no user JWT available
verify_jwt = false

[functions.polar-webhook]
# Receives external Polar payment webhook callbacks — no user JWT available
verify_jwt = false
